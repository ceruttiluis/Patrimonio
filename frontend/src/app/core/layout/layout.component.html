<mat-sidenav-container class="h-screen">

  <!-- SIDEBAR -->
  <mat-sidenav
    mode="side"
    opened
    class="w-64 bg-slate-900 text-white"
  >

    <div class="p-4 text-xl font-semibold border-b border-slate-700">
      Patrimônio
    </div>

    <nav class="flex flex-col p-2 space-y-2">

      <a mat-button routerLink="/dashboard">
        Dashboard
      </a>

      <a mat-button routerLink="/patrimonios">
        Patrimônios
      </a>

      <a mat-button routerLink="/transferencias">
        Transferências
      </a>

      <a mat-button routerLink="/baixas">
        Baixas
      </a>

    </nav>

  </mat-sidenav>

  <!-- CONTEÚDO -->
  <mat-sidenav-content>

    <!-- HEADER -->
    <mat-toolbar color="primary">

      <span class="font-semibold">
        Sistema de Patrimônio
      </span>

      <span class="flex-1"></span>

      <button mat-icon-button>
        <mat-icon>account_circle</mat-icon>
      </button>

    </mat-toolbar>

    <!-- AREA DAS TELAS -->
    <div class="p-6 bg-gray-50 min-h-screen">

      <router-outlet></router-outlet>

    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
