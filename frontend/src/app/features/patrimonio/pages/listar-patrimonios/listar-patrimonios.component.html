<div class="space-y-6">

  <div class="flex justify-between items-center">

    <h1 class="text-2xl font-semibold">
      Patrimônios
    </h1>

    <button mat-raised-button color="primary" (click)="abrirCadastro()">
      <mat-icon>add</mat-icon>
      Novo Patrimônio
    </button>

  </div>

  <div class="bg-white p-4 rounded shadow">

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Buscar patrimônio</mat-label>

      <input matInput [(ngModel)]="filtro" (keyup)="aplicarFiltro()" placeholder="Digite descrição ou número">
    </mat-form-field>

  </div>


  <div class="bg-white rounded shadow">

    <table mat-table [dataSource]="dataSource">

      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>Número</th>
        <td mat-cell *matCellDef="let element">
          {{element.numero}}
        </td>
      </ng-container>

      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef>Descrição</th>
        <td mat-cell *matCellDef="let element">
          {{element.descricao}}
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let element">
          {{element.status}}
        </td>
      </ng-container>

      <ng-container matColumnDef="tipo">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let element">
          {{element.tipo}}
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>

        <td mat-cell *matCellDef="let element">

          <button mat-icon-button color="primary">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button color="accent">
            <mat-icon>swap_horiz</mat-icon>
          </button>

          <button mat-icon-button color="warn">
            <mat-icon>delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas;"></tr>

    </table>

    <mat-paginator [pageSize]="10" showFirstLastButtons>
    </mat-paginator>

  </div>

</div>
